
<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  />

  <link
    rel="stylesheet"
    href="global.css"
  />

  <link
    rel="stylesheet"
    href="styleadmin.css"
  />

  <title>Painel Admin</title>

  <style>

    /* =======================
       SIDEBAR ADMIN
    ======================== */

    .admin-profile{
      display:flex;
      align-items:center;
      gap:14px;

      background:
      linear-gradient(
        135deg,
        #1e293b,
        #0f172a
      );

      border-radius:22px;

      padding:18px;

      margin-bottom:24px;

      border:1px solid
      rgba(255,255,255,.08);
    }

    .admin-avatar{
      width:60px;
      height:60px;

      border-radius:50%;
      object-fit:cover;

      border:3px solid
      rgba(255,255,255,.15);
    }

    .admin-info{
      display:flex;
      flex-direction:column;
    }

    .admin-info h2{
      margin:0;

      color:#fff;
      font-size:18px;
      font-weight:700;
    }

    .admin-role{
      color:#94a3b8;
      font-size:13px;
      margin-top:4px;
    }

    .sidebar-section-label{
      color:#94a3b8;
      font-size:12px;
      font-weight:700;

      text-transform:uppercase;

      letter-spacing:.08em;

      margin-bottom:14px;
    }

    .card nav ul{
      list-style:none;
      padding:0;
      margin:0;
    }

    .card nav ul li{
      margin-bottom:10px;
    }

    .card nav ul li a{
      display:flex;
      align-items:center;

      text-decoration:none;

      padding:14px 18px;

      border-radius:14px;

      color:#cbd5e1;
      font-weight:500;

      transition:.2s;
    }

    .card nav ul li a:hover{
      background:#1e293b;
      color:#fff;
    }

    .card nav ul li a.active{
      background:#2563eb;
      color:#fff;

      box-shadow:
      0 10px 25px
      rgba(37,99,235,.25);
    }

    .logout-btn{
      margin-top:auto;

      width:100%;

      background:white;
      color:#fff;

      border:none;

      border-radius:14px;

      padding:14px;

      font-weight:600;

      cursor:pointer;

      transition:.2s;
    }

    .logout-btn:hover{
      opacity:.92;
    }

    .descricao-box{
      display:flex;
      flex-direction:column;
      gap:6px;
    }

    .descricao-text{
      color:#0f172a;
      font-weight:600;
    }

    .descricao-valor{
      color:#64748b;
      font-size:13px;
    }

    .table-wrap table td{
      vertical-align:middle;
    }

  </style>

</head>

<body>

  <!-- SIDEBAR -->
  <div class="card">

    <!-- PERFIL ADMIN -->
    <div class="admin-profile">

      <img
        src="1487716857-user_81635.webp"
        alt="Admin"
        class="admin-avatar"
      >

      <div class="admin-info">

        <h2 id="nomeAdmin">
          Admin
        </h2>

        <span class="admin-role">
          Administrador
        </span>

      </div>

    </div>


    <p class="sidebar-section-label">
      Gerenciar
    </p>

    <nav>
      <ul>

        <li>
          <a
            href="admin.html"
            class="active"
          >
            Solicitações
          </a>
        </li>

        <li>
          <a href="admin_cadastro.html">
            Cadastrar Admin
          </a>
        </li>

        <li>
          <a href="user_admin.html">
            Meu Perfil
          </a>
        </li>

      </ul>
    </nav>

    <button
      class="logout-btn"
      onclick="logout()"
      style=" margin-top:auto; background:blue; color:white;"
    >
      Sair
    </button>

  </div>


  <!-- MAIN -->
  <div class="main">

    <div class="main-header">
      <h1>
        Solicitações
      </h1>

      <p>
        Gerencie todas as solicitações dos usuários
      </p>
    </div>


    <!-- STATS -->
    <div class="stats-grid">

      <div class="stat-card">
        <div class="stat-label">
          Total
        </div>

        <div
          class="stat-value"
          id="stat-total"
        >
          —
        </div>
      </div>

      <div class="stat-card pending">
        <div class="stat-label">
          Pendentes
        </div>

        <div
          class="stat-value"
          id="stat-pending"
        >
          —
        </div>
      </div>

      <div class="stat-card approved">
        <div class="stat-label">
          Aprovadas
        </div>

        <div
          class="stat-value"
          id="stat-approved"
        >
          —
        </div>
      </div>

      <div class="stat-card rejected">
        <div class="stat-label">
          Rejeitadas
        </div>

        <div
          class="stat-value"
          id="stat-rejected"
        >
          —
        </div>
      </div>

    </div>


    <!-- TABELA -->
    <div class="content-card">

      <div class="content-card-header">

        <h2>
          Todas as solicitações
        </h2>

        <div class="filters">

          <button
            class="filter-btn active"
            onclick="filtrar('todas', this)"
          >
            Todas
          </button>

          <button
            class="filter-btn"
            onclick="filtrar('pendente', this)"
          >
            Pendentes
          </button>

          <button
            class="filter-btn"
            onclick="filtrar('aprovado', this)"
          >
            Aprovadas
          </button>

          <button
            class="filter-btn"
            onclick="filtrar('rejeitado', this)"
          >
            Rejeitadas
          </button>

        </div>

      </div>

      <div class="table-wrap">

        <table>

          <thead>
            <tr>
              <th>#</th>
              <th>Usuário</th>
              <th>Descrição</th>
              <th>Data</th>
              <th>Status</th>
              <th>Ações</th>
            </tr>
          </thead>

          <tbody id="tabela-body">

            <tr>
              <td colspan="6">
                Carregando...
              </td>
            </tr>

          </tbody>

        </table>

      </div>

    </div>

  </div>

<script>

const admin =
JSON.parse(
  localStorage.getItem('admin')
  || 'null'
);

if (!admin) {

  location.href =
  'admin_login.html';

} else {

  document
  .getElementById(
    'nomeAdmin'
  )
  .textContent =
  admin.nome || 'Admin';
}

function logout(){

  localStorage.removeItem(
    'admin'
  );

  location.href =
  'admin_login.html';
}

let todasSolicitacoes = [];
let filtroAtual = 'todas';

async function carregarSolicitacoes(){

  try{

    const res =
    await fetch(
      'admin_solicitacoes.php'
    );

    const dados =
    await res.json();

    if(dados.sucesso){

      todasSolicitacoes =
      dados.solicitacoes;

      atualizarStats();

      renderTabela(
        todasSolicitacoes
      );

    }

  }catch(erro){

    console.error(
      erro
    );

  }
}

function atualizarStats(){

  document
  .getElementById(
    'stat-total'
  )
  .textContent =
  todasSolicitacoes.length;

  document
  .getElementById(
    'stat-pending'
  )
  .textContent =
  todasSolicitacoes.filter(
    s =>
    s.status ===
    'pendente'
  ).length;

  document
  .getElementById(
    'stat-approved'
  )
  .textContent =
  todasSolicitacoes.filter(
    s =>
    s.status ===
    'aprovado'
  ).length;

  document
  .getElementById(
    'stat-rejected'
  )
  .textContent =
  todasSolicitacoes.filter(
    s =>
    s.status ===
    'rejeitado'
  ).length;
}

function renderTabela(lista){

  const tbody =
  document.getElementById(
    'tabela-body'
  );

  tbody.innerHTML =
  lista.map(s => {

    const descricao =
    s.descricao
    ? escHtml(
      s.descricao
    )
    : 'Sem descrição';

    const valor =
    s.valor
    ? `R$ ${Number(
        s.valor
      ).toFixed(2)}`
    : '';

    const acoes =
    s.status ===
    'pendente'

    ? `
      <div class="action-btns">

        <button
          class="btn-approve"
          onclick="
          atualizarStatus(
            ${s.id},
            'aprovado'
          )
          ">
          Aprovar
        </button>

        <button
          class="btn-reject"
          onclick="
          atualizarStatus(
            ${s.id},
            'rejeitado'
          )
          ">
          Rejeitar
        </button>

      </div>
    `
    : '—';

    return `
      <tr>

        <td>
          #${s.id}
        </td>

        <td>
          <strong>
            ${escHtml(
              s.nome_usuario
            )}
          </strong>

          <br>

          <small>
            ${escHtml(
              s.login_usuario
            )}
          </small>
        </td>

        <td>
          <div class="descricao-box">

            <span class="descricao-text">
              ${descricao}
            </span>

            <span class="descricao-valor">
              ${valor}
            </span>

          </div>
        </td>

        <td>
          ${new Date(
            s.data
          ).toLocaleString(
            'pt-BR'
          )}
        </td>

        <td>
          ${s.status}
        </td>

        <td>
          ${acoes}
        </td>

      </tr>
    `;

  }).join('');
}

function filtrar(status, btn){

  filtroAtual =
  status;

  document
  .querySelectorAll(
    '.filter-btn'
  )
  .forEach(b =>
    b.classList.remove(
      'active'
    )
  );

  btn.classList.add(
    'active'
  );

  const lista =
  status === 'todas'
  ? todasSolicitacoes
  : todasSolicitacoes.filter(
      s =>
      s.status === status
    );

  renderTabela(
    lista
  );
}

async function atualizarStatus(
  id,
  novoStatus
){

  const res =
  await fetch(
    'admin_solicitacoes.php',
    {
      method:'POST',

      headers:{
        'Content-Type':
        'application/json'
      },

      body:
      JSON.stringify({
        id,
        status:
        novoStatus
      })
    }
  );

  const dados =
  await res.json();

  if(dados.sucesso){

    carregarSolicitacoes();
  }
}

function escHtml(str){

  return String(
    str ?? ''
  )
  .replace(/&/g,'&amp;')
  .replace(/</g,'&lt;')
  .replace(/>/g,'&gt;')
  .replace(/"/g,'&quot;');
}

carregarSolicitacoes();

</script>

</body>
</html>
