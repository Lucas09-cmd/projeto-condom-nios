
<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  >

  <title>Admin — Login</title>

  <link rel="stylesheet" href="stylelogin.css">

  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:Arial, Helvetica, sans-serif;
    }

    body{
      background:#f5f5f5;
      min-height:100vh;
      display:flex;
      justify-content:center;
      align-items:center;
    }

    .fundo{
      width:100%;
      max-width:400px;
      background:#fff;
      padding:30px;
      border-radius:14px;
      box-shadow:0 4px 20px rgba(0,0,0,.1);
      text-align:center;
    }

    .fundo img{
      width:80px;
      margin-bottom:15px;
    }

    .badge-admin{
      display:inline-block;
      font-size:10px;
      font-weight:700;
      letter-spacing:.1em;
      text-transform:uppercase;
      background:#fef3c7;
      color:#92400e;
      padding:4px 10px;
      border-radius:20px;
      margin-bottom:12px;
    }

    h2{
      margin-bottom:6px;
    }

    .sub{
      color:#777;
      font-size:13px;
      margin-bottom:20px;
    }

    form{
      display:flex;
      flex-direction:column;
      gap:12px;
    }

    input{
      width:100%;
      padding:12px;
      border:1px solid #ccc;
      border-radius:8px;
      outline:none;
      font-size:14px;
    }

    input:focus{
      border-color:#111;
    }

    button{
      border:none;
      border-radius:8px;
      padding:12px;
      background:#111;
      color:#fff;
      cursor:pointer;
      font-weight:600;
      transition:.2s;
    }

    button:hover{
      opacity:.9;
    }

    button:disabled{
      opacity:.7;
      cursor:not-allowed;
    }

    #mensagemErro{
      color:#991b1b;
      margin-top:14px;
      font-size:13px;
      min-height:18px;
    }

    .link-row{
      margin-top:16px;
      font-size:13px;
    }

    .link-row a{
      color:#111;
      text-decoration:none;
      font-weight:600;
    }

    .link-row a:hover{
      text-decoration:underline;
    }
  </style>
</head>

<body>

<div class="fundo">

  <img
    src="1487716857-user_81635.webp"
    alt="Logo"
  >

  <span class="badge-admin">
    Administrador
  </span>

  <h2>Acesso Restrito</h2>

  <p class="sub">
    Entre com suas credenciais de administrador
  </p>

  <form id="formLogin">

    <input
      type="email"
      id="login"
      placeholder="E-mail do administrador"
      required
    >

    <input
      type="password"
      id="senha"
      placeholder="Senha"
      required
    >

    <button
      type="submit"
      id="btnEntrar"
    >
      Entrar como admin
    </button>

  </form>

  <p id="mensagemErro"></p>

  <div class="link-row">
    <a href="login.html">
      ← Área do usuário
    </a>
  </div>

</div>

<script>

// ==========================
// CHECA SE JÁ ESTÁ LOGADO
// ==========================

const adminSalvo =
localStorage.getItem(
'admin'
);

console.log(
'ADMIN SALVO AO ABRIR:',
adminSalvo
);

if(adminSalvo){

location.href =
'admin.html';
}

// ==========================
// ELEMENTOS
// ==========================

const form =
document.getElementById(
'formLogin'
);

const btn =
document.getElementById(
'btnEntrar'
);

const erro =
document.getElementById(
'mensagemErro'
);

// ==========================
// LOGIN
// ==========================

form.addEventListener(
'submit',
async function(e){

e.preventDefault();

erro.textContent='';

btn.disabled=true;

btn.textContent=
'Entrando...';

try{

const resposta =
await fetch(
'admin_login.php',
{
method:'POST',

headers:{
'Content-Type':
'application/json'
},

body: JSON.stringify({

login:
document
.getElementById(
'login'
)
.value.trim(),

senha:
document
.getElementById(
'senha'
)
.value
})
}
);

const dados =
await resposta.json();

console.log(
'RESPOSTA LOGIN:',
dados
);

// ==========================
// LOGIN OK
// ==========================

if(dados.sucesso){

console.log(
'ADMIN RECEBIDO:',
dados.admin
);

// salva admin
localStorage.setItem(
'admin',
JSON.stringify(
dados.admin
)
);

console.log(
'SALVO:',
localStorage.getItem(
'admin'
)
);

// redireciona
location.href =
'admin.html';

}else{

erro.textContent =
dados.mensagem ||
'Login inválido.';
}

}catch(error){

console.error(
'ERRO LOGIN:',
error
);

erro.textContent =
'Erro ao conectar ao servidor.';
}

finally{

btn.disabled=false;

btn.textContent =
'Entrar como admin';
}
});

</script>

</body>
</html>
