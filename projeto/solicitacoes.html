<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  />

  <link
    rel="stylesheet"
    href="global.css"
  />

  <link
    rel="stylesheet"
    href="style2.css"
  />

  <title>Solicitações</title>

  <style>

    .user-profile{
      display:flex;
      align-items:center;
      gap:14px;
    }

    .user-profile img{
      width:52px;
      height:52px;
      border-radius:50%;
      object-fit:cover;
    }

    .user-info{
      display:flex;
      flex-direction:column;
    }

    .user-name{
      color:white;
      font-size:15px;
      font-weight:600;
    }

    .user-role{
      color:#94a3b8;
      font-size:12px;
    }

    .solicitacao-section{
      margin-top:30px;
    }

    .section-title{
      font-size:18px;
      font-weight:700;
      color:#0f172a;
      margin-bottom:16px;
    }

    .solicitacao-list{
      list-style:none;
      padding:0;
      margin:0;

      display:flex;
      flex-direction:column;
      gap:14px;
    }

    .solicitacao-card{
      background:white;
      border-radius:22px;
      padding:24px;

      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:20px;

      box-shadow:
      0 10px 30px
      rgba(15,23,42,.08);
    }

    .solicitacao-info h3{
      margin:0;
      color:#0f172a;
      font-size:18px;
    }

    .solicitacao-info p{
      margin:8px 0 0;
      color:#64748b;
      font-size:14px;
    }

    .badge{
      padding:10px 16px;
      border-radius:999px;
      font-size:13px;
      font-weight:700;
    }

    .badge-pending{
      background:#fef3c7;
      color:#b45309;
    }

    .badge-approved{
      background:#dcfce7;
      color:#15803d;
    }

    .badge-rejected{
      background:#fee2e2;
      color:#b91c1c;
    }

    .nova-solicitacao{
      background:white;
      border-radius:28px;
      padding:30px;
      margin-top:30px;

      box-shadow:
      0 10px 30px
      rgba(15,23,42,.08);
    }

    .nova-header{
      margin-bottom:20px;
    }

    .nova-header h3{
      margin:0;
      color:#0f172a;
      font-size:24px;
    }

    .nova-header p{
      color:#64748b;
      margin-top:8px;
    }

    .input-row{
      display:flex;
      gap:16px;
      flex-wrap:wrap;
    }

    .input-row input{
      flex:1;
      min-width:220px;

      border:
      1px solid #cbd5e1;

      border-radius:16px;

      padding:16px 18px;
      font-size:15px;

      outline:none;
    }

    .input-row button{
      border:none;
      background:#2563eb;
      color:white;

      border-radius:16px;
      padding:16px 28px;

      font-weight:700;
      cursor:pointer;
    }

    .input-row button:hover{
      opacity:.92;
    }

    .empty-state{
      background:white;
      padding:24px;
      border-radius:20px;
      text-align:center;
      color:#64748b;
    }

  </style>

</head>

<body>

  <!-- SIDEBAR -->
  <div class="card">

    <nav>
      <ul>
        <li>
          <a
            href="user.html"
            class="user-profile"
            style="color:black"
          >

            <img
              src="1487716857-user_81635.webp"
              alt="Usuário"
            >

            <div class="user-info">

              <span
                class="user-name"
                id="nomeUsario"
                            style="color:black"

              >
                —
              </span>

              <span class="user-role">
                Usuário
              </span>

            </div>

          </a>
        </li>
      </ul>
    </nav>

    <p class="sidebar-section-label">
      Menu
    </p>

    <nav>
      <ul>

        <li>
          <a href="home.html">
            Home
          </a>
        </li>

        <li>
          <a
            href="solicitacoes.html"
            class="active"
          >
            Solicitações
          </a>
        </li>

        <li>
          <a href="configuracoes.html">
            Configurações
          </a>
        </li>

      </ul>
    </nav>

    <button
      type="button"
      onclick="logout()"
      class="logout-btn"
      style="margin-top:auto;"
    >
      Sair
    </button>

  </div>


  <!-- MAIN -->
  <div class="main">

    <div class="main-header">

      <h1>
        Solicitações
      </h1>

      <p id="nomeUsuario">
        Bem-vindo!
      </p>

    </div>


    <!-- NOVA SOLICITAÇÃO -->
    <div class="nova-solicitacao">

      <div class="nova-header">

        <h3>
          Nova Solicitação
        </h3>

        <p>
          Crie uma nova solicitação e acompanhe o status.
        </p>

      </div>

      <div class="input-row">

        <input
          type="text"
          id="novaSolicitacao"
          placeholder="Digite sua solicitação..."
        >

        <button onclick="novasolicitacao()">
          + Solicitar
        </button>

      </div>

      <p
        id="msg-solicitacao"
        style="
        margin-top:14px;
        font-size:14px;
        "
      ></p>

    </div>


    <div class="solicitacao-section">
      <div class="section-title">
        Pendentes
      </div>

      <ul
        id="lista-pendentes"
        class="solicitacao-list"
      ></ul>
    </div>


    <div class="solicitacao-section">
      <div class="section-title">
        Aprovadas
      </div>

      <ul
        id="lista-aprovadas"
        class="solicitacao-list"
      ></ul>
    </div>


    <div class="solicitacao-section">
      <div class="section-title">
        Rejeitadas
      </div>

      <ul
        id="lista-rejeitadas"
        class="solicitacao-list"
      ></ul>
    </div>

  </div>


<script>

const usuario =
JSON.parse(
localStorage.getItem('usuario')
|| 'null'
);

if (!usuario) {

  location.href =
  'login.html';

} else {

  document
  .getElementById(
    'nomeUsario'
  )
  .textContent =
  usuario.nome;

  document
  .getElementById(
    'nomeUsuario'
  )
  .textContent =
  'Bem-vindo, ' +
  usuario.nome;

  carregarSolicitacoes();
}


function logout() {

  localStorage.removeItem(
    'usuario'
  );

  location.href =
  'login.html';
}


function badgeHTML(status){

  const map = {

    pendente:
    ['badge-pending','Aguardando'],

    aprovado:
    ['badge-approved','Aprovada'],

    rejeitado:
    ['badge-rejected','Rejeitada']
  };

  const [classe,texto] =
  map[status];

  return `
    <span class="
      badge
      ${classe}
    ">
      ${texto}
    </span>
  `;
}


function renderItem(s){

  const li =
  document.createElement(
    'li'
  );

  li.className =
  'solicitacao-card';

  li.innerHTML = `

    <div class="solicitacao-info">

      <h3>
        ${
          s.descricao
          || (
            s.valor
            ? 'R$ ' +
            Number(
              s.valor
            ).toFixed(2)
            : 'Sem descrição'
          )
        }
      </h3>

      <p>
        ${s.data}
      </p>

    </div>

    ${badgeHTML(
      s.status
    )}

  `;

  return li;
}


async function carregarSolicitacoes(){

  const res =
  await fetch(
    `solicitacao.php?id_usuario=${usuario.id}`
  );

  const dados =
  await res.json();

  const pendentes =
  document.getElementById(
    'lista-pendentes'
  );

  const aprovadas =
  document.getElementById(
    'lista-aprovadas'
  );

  const rejeitadas =
  document.getElementById(
    'lista-rejeitadas'
  );

  pendentes.innerHTML =
  '';

  aprovadas.innerHTML =
  '';

  rejeitadas.innerHTML =
  '';

  dados.solicitacoes.forEach(
    s => {

      if(
        s.status ===
        'pendente'
      ){
        pendentes.appendChild(
          renderItem(s)
        );
      }

      if(
        s.status ===
        'aprovado'
      ){
        aprovadas.appendChild(
          renderItem(s)
        );
      }

      if(
        s.status ===
        'rejeitado'
      ){
        rejeitadas.appendChild(
          renderItem(s)
        );
      }
    }
  );
}


async function novasolicitacao(){

  const input =
  document.getElementById(
    'novaSolicitacao'
  );

  const descricao =
  input.value.trim();

  const msg =
  document.getElementById(
    'msg-solicitacao'
  );

  if(!descricao){

    msg.style.color =
    '#dc2626';

    msg.textContent =
    'Digite uma solicitação.';

    return;
  }

  const res =
  await fetch(
    'solicitacao.php',
    {
      method:'POST',

      headers:{
        'Content-Type':
        'application/json'
      },

      body:
      JSON.stringify({

        id_usuario:
        usuario.id,

        descricao
      })
    }
  );

  const dados =
  await res.json();

  if(dados.sucesso){

    input.value =
    '';

    carregarSolicitacoes();

    msg.style.color =
    '#16a34a';

    msg.textContent =
    'Solicitação enviada com sucesso!';
  }
}

</script>

</body>
</html>
