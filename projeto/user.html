<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  />

  <link
    rel="stylesheet"
    href="global.css"
  />

  <link
    rel="stylesheet"
    href="style2.css"
  />

  <title>Perfil</title>
</head>

<body>
  <style>

    .perfil-wrapper{
      display:flex;
      gap:30px;
      flex-wrap:wrap;
    }

    .perfil-card{
      flex:1;
      min-width:320px;

      background:white;
      border-radius:24px;

      padding:35px;

      box-shadow:
      0 10px 30px
      rgba(15,23,42,.08);
    }

    .perfil-header{
      display:flex;
      align-items:center;
      gap:20px;
      margin-bottom:30px;
    }

    .perfil-avatar{

      width:110px;
      height:110px;

      border-radius:50%;

      object-fit:cover;

      border:5px solid #090909;
    }

    .perfil-nome{
      font-size:28px;
      font-weight:700;
      color:#0f172a;
    }

    .perfil-email{
      color:#64748b;
      font-size:15px;
      margin-top:4px;
    }

    .perfil-badge{
      margin-top:12px;

      display:inline-flex;

      background:#dbeafe;
      color:#2563eb;

      font-size:13px;
      font-weight:600;

      padding:8px 14px;

      border-radius:999px;
    }

    .info-grid{
      display:grid;
      grid-template-columns:
      repeat(
        auto-fit,
        minmax(250px,1fr)
      );

      gap:18px;
    }

    .info-card{

      background:#f8fafc;

      border:
      1px solid #e2e8f0;

      border-radius:18px;

      padding:20px;
    }

    .info-label{
      color:#64748b;
      font-size:13px;
      margin-bottom:8px;
    }

    .info-value{
      color:#0f172a;
      font-size:18px;
      font-weight:600;

      word-break:break-word;
    }

    .perfil-actions{
      margin-top:30px;
      display:flex;
      gap:14px;
      flex-wrap:wrap;
    }

    .btn-primary{
      background:#2563eb;
      color:white;

      padding:14px 22px;
      border-radius:14px;

      border:none;
      cursor:pointer;

      font-weight:600;
    }

    .btn-primary:hover{
      opacity:.92;
    }

    .btn-danger{
      background:#ef4444;
      color:white;

      padding:14px 22px;
      border-radius:14px;

      border:none;
      cursor:pointer;

      font-weight:600;
    }

  </style>
  <!-- SIDEBAR -->
  <div class="card" id="page">

    <nav>
      <ul>
        <li>
          <a href="user.html">

            <img
              src="1487716857-user_81635.webp"
              alt="Usuário"
              style="
              width:52px;
              height:52px;
              border-radius:50%;
              object-fit:cover;
              "
            >

            <div>
              <h1
                id="nomeUsario"
                style="
                font-size:16px;
                color:black;
                "
              ></h1>

              <small
                style="
                color:#94a3b8;
                "
              >
                Usuário
              </small>
            </div>

          </a>
        </li>
      </ul>
    </nav>

    <p class="sidebar-section-label">
      Menu
    </p>

    <nav>
      <ul>
        <li>
          <a href="home.html">
            Home
          </a>
        </li>

        <li>
          <a href="solicitacoes.html">
            Solicitações
          </a>
        </li>


        <li>
          <a href="configuracoes.html">
            Configurações
          </a>
        </li>
      </ul>
    </nav>

    <button
      type="button"
      onclick="logout()"
      class="logout-btn"
    >
      Sair
    </button>

  </div>


  <!-- MAIN -->
  <div class="main">

    <div class="main-header">
      <h2>
        Meu Perfil
      </h2>

      <p>
        Visualize suas informações pessoais
      </p>
    </div>


    <div class="perfil-wrapper">

      <div class="perfil-card">

        <div class="perfil-header">

          <img
            src="1487716857-user_81635.webp"
            class="perfil-avatar"
          >

          <div>

            <div
              class="perfil-nome"
              id="perfilNome"
            >
              —
            </div>

            <div
              class="perfil-email"
              id="perfilLogin"
            >
              —
            </div>

            <div class="perfil-badge">
              Usuário Ativo
            </div>

          </div>

        </div>


        <div class="info-grid">

          <div class="info-card">
            <div class="info-label">
              Nome Completo
            </div>

            <div
              class="info-value"
              id="infoNome"
            >
              —
            </div>
          </div>

          <div class="info-card">
            <div class="info-label">
              E-mail/Login
            </div>

            <div
              class="info-value"
              id="infoLogin"
            >
              —
            </div>
          </div>

          <div class="info-card">
            <div class="info-label">
              ID do Usuário
            </div>

            <div
              class="info-value"
              id="infoId"
            >
              —
            </div>
          </div>

          <div class="info-card">
            <div class="info-label">
              Tipo de Conta
            </div>

            <div class="info-value">
              Usuário
            </div>
          </div>

        </div>


        <div class="perfil-actions">

          <button
            class="btn-primary"
            onclick="
            location.href=
            'configuracoes.html'
            "
          >
            Configurações
          </button>

          <button
            class="btn-danger"
            onclick="logout()"
          >
            Sair da Conta
          </button>

        </div>

      </div>

    </div>

  </div>

<script>

const usuario =
JSON.parse(
  localStorage.getItem(
    'usuario'
  )
  || 'null'
);


// ====================
// LOGIN
// ====================

if (!usuario) {

  location.href =
  'login.html';

} else {

  document
  .getElementById(
    'nomeUsario'
  )
  .textContent =
  usuario.nome
  || 'Usuário';

  document
  .getElementById(
    'perfilNome'
  )
  .textContent =
  usuario.nome
  || '—';

  document
  .getElementById(
    'perfilLogin'
  )
  .textContent =
  usuario.login
  || '—';

  document
  .getElementById(
    'infoNome'
  )
  .textContent =
  usuario.nome
  || '—';

  document
  .getElementById(
    'infoLogin'
  )
  .textContent =
  usuario.login
  || '—';

  document
  .getElementById(
    'infoId'
  )
  .textContent =
  usuario.id
  || '—';

}


// ====================
// LOGOUT
// ====================

function logout(){

  localStorage.removeItem(
    'usuario'
  );

  location.href =
  'login.html';
}

</script>

</body>
</html>
