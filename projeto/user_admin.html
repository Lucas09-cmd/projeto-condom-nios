<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  />

  <link
    rel="stylesheet"
    href="global.css"
  />

  <link
    rel="stylesheet"
    href="styleadmin.css"
  />

  <title>
    Perfil do Administrador
  </title>

  <style>

    .perfil-wrapper{
      display:flex;
      gap:30px;
      flex-wrap:wrap;
    }

    .perfil-card{
      width:100%;
      background:white;
      border-radius:24px;
      padding:35px;

      box-shadow:
      0 10px 30px
      rgba(15,23,42,.08);
    }

    .perfil-header{
      display:flex;
      align-items:center;
      gap:24px;
      margin-bottom:35px;
    }

    .perfil-avatar{
      width:120px;
      height:120px;
      border-radius:50%;
      object-fit:cover;
      border:5px solid #e2e8f0;
    }

    .perfil-nome{
      font-size:30px;
      font-weight:700;
      color:#0f172a;
    }

    .perfil-email{
      color:#64748b;
      margin-top:6px;
      font-size:16px;
    }

    .perfil-badge{
      margin-top:14px;
      display:inline-flex;
      align-items:center;

      background:#dbeafe;
      color:#2563eb;

      padding:8px 16px;
      border-radius:999px;

      font-size:13px;
      font-weight:600;
    }

    .info-grid{
      display:grid;

      grid-template-columns:
      repeat(
        auto-fit,
        minmax(240px,1fr)
      );

      gap:20px;
    }

    .info-card{
      background:#f8fafc;

      border:
      1px solid #e2e8f0;

      border-radius:18px;

      padding:22px;
    }

    .info-label{
      font-size:13px;
      color:#64748b;
      margin-bottom:8px;
    }

    .info-value{
      font-size:18px;
      font-weight:600;
      color:#0f172a;
      word-break:break-word;
    }

    .perfil-actions{
      margin-top:30px;
      display:flex;
      gap:15px;
      flex-wrap:wrap;
    }

    .btn-primary{
      background:black;
      color:white;
      border:none;

      padding:14px 24px;
      border-radius:14px;

      cursor:pointer;
      font-weight:600;
    }

    .btn-danger{
      background:black;
      color:white;
      border:none;

      padding:14px 24px;
      border-radius:14px;

      cursor:pointer;
      font-weight:600;
    }

    .admin-user{
      display:flex;
      align-items:center;
      gap:12px;
    }

    .admin-user img{
      width:48px;
      height:48px;
      border-radius:50%;
      object-fit:cover;
    }

    .admin-user-info{
      display:flex;
      flex-direction:column;
    }

    .admin-user-name{
      color:white;
      font-weight:600;
      font-size:15px;
    }

    .admin-user-role{
      color:#94a3b8;
      font-size:12px;
    }

  </style>

</head>

<body>

  <!-- SIDEBAR -->
  <div class="card">

    <!-- CONTA (igual admin.html) -->
    <nav>
      <ul>
        <li>
          <a
            href="user_admin.html"
            class="admin-user"
          >

            <img
              src="1487716857-user_81635.webp"
              alt="Administrador"
            >

            <div class="admin-user-info">

              <span
                class="admin-user-name"
                id="nomeAdmin"
              >
                —
              </span>

              <span
                class="admin-user-role"
              >
                Administrador
              </span>

            </div>

          </a>
        </li>
      </ul>
    </nav>

    <p class="sidebar-section-label">
      Gerenciar
    </p>

    <nav>
      <ul>

        <li>
          <a href="admin.html">
            Solicitações
          </a>
        </li>

        <li>
          <a href="admin_cadastro.html">
            Cadastrar Admin
          </a>
        </li>

        <li>
          <a
            href="user_admin.html"
            class="active"
          >
            Meu Perfil
          </a>
        </li>

      </ul>
    </nav>

    <button
      class="logout-btn"
      onclick="logout()"
      style=" margin-top:auto; background:blue; color:white;"
    >
      Sair
    </button>

  </div>


  <!-- MAIN -->
  <div class="main">

    <div class="main-header">

      <h1>
        Perfil do Administrador
      </h1>

      <p>
        Informações da sua conta administrativa
      </p>

    </div>


    <div class="perfil-wrapper">

      <div class="perfil-card">

        <div class="perfil-header">

          <img
            src="1487716857-user_81635.webp"
            class="perfil-avatar"
            alt="Administrador"
          >

          <div>

            <div
              class="perfil-nome"
              id="perfilNome"
            >
              —
            </div>

            <div
              class="perfil-email"
              id="perfilLogin"
            >
              —
            </div>

            <div class="perfil-badge">
              Administrador
            </div>

          </div>

        </div>


        <div class="info-grid">

          <div class="info-card">
            <div class="info-label">
              Nome Completo
            </div>

            <div
              class="info-value"
              id="infoNome"
            >
              —
            </div>
          </div>


          <div class="info-card">
            <div class="info-label">
              Login / Email
            </div>

            <div
              class="info-value"
              id="infoLogin"
            >
              —
            </div>
          </div>


          <div class="info-card">
            <div class="info-label">
              ID do Administrador
            </div>

            <div
              class="info-value"
              id="infoId"
            >
              —
            </div>
          </div>


          <div class="info-card">
            <div class="info-label">
              Tipo de Conta
            </div>

            <div class="info-value">
              Administrador
            </div>
          </div>

        </div>


        <div class="perfil-actions">

          <button
            class="btn-primary"
            onclick="
            location.href=
            'admin_cadastro.html'
            "
          >
            Gerenciar Admins
          </button>

          <button
            class="btn-danger"
            onclick="logout()"
          >
            Sair da Conta
          </button>

        </div>

      </div>

    </div>

  </div>


<script>

const admin =
JSON.parse(
  localStorage.getItem(
    'admin'
  )
  || 'null'
);


// ====================
// PROTEÇÃO
// ====================

if (!admin) {

  location.href =
  'admin_login.html';

} else {

  // sidebar
  document
  .getElementById(
    'nomeAdmin'
  )
  .textContent =
  admin.nome
  || 'Administrador';

  // card principal
  document
  .getElementById(
    'perfilNome'
  )
  .textContent =
  admin.nome
  || '—';

  document
  .getElementById(
    'perfilLogin'
  )
  .textContent =
  admin.login
  || '—';

  document
  .getElementById(
    'infoNome'
  )
  .textContent =
  admin.nome
  || '—';

  document
  .getElementById(
    'infoLogin'
  )
  .textContent =
  admin.login
  || '—';

  document
  .getElementById(
    'infoId'
  )
  .textContent =
  admin.id
  || '—';
}


// ====================
// LOGOUT
// ====================

function logout(){

  localStorage.removeItem(
    'admin'
  );

  location.href =
  'admin_login.html';
}

</script>

</body>
</html>
